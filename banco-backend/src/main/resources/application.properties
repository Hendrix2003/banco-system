spring.application.name=banco-backend
server.port=8080

# Base de datos
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:banco}
spring.datasource.username=${DB_USER:banco}
spring.datasource.password=${DB_PASSWORD:banco123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Limite diario de retiro
banco.limite-retiro-diario=1000

# Logs
logging.level.com.banco=INFO
